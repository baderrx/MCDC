<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مركز 10-9-8 سنغال | الفنادق</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="container">
        <!-- ========== قسم الصور في الأعلى ========== -->
        <div class="top-images-section">
            <div class="top-image left-image">
                <img id="topLeftImage" src="https://via.placeholder.com/100x100?text=شعار+يسار" alt="شعار يسار">
            </div>
            <div class="top-image center-image">
                <img id="topCenterImage" src="https://via.placeholder.com/120x120?text=شعار+وسط" alt="شعار وسط">
            </div>
            <div class="top-image right-image">
                <img id="topRightImage" src="https://via.placeholder.com/100x100?text=شعار+يمين" alt="شعار يمين">
            </div>
        </div>

        <!-- الهيدر -->
        <div class="header">
            <h1>Centre 10-9-8 <span class="vip-badge">Sénégal</span></h1>
            <p class="welcome-text">Bonjour et bienvenue, nous sommes honorés de vous servir 24 heures sur 24.</p>
        </div>

        <!-- موقع المركز الرئيسي - صورة كبيرة مع مساحة للكتابة أسفلها -->
        <div class="section-title">
            <i class="fas fa-map-marker-alt"></i>
            <h2>Emplacement du centre</h2>
        </div>
        <div class="location-card main-location" id="companyLocationBtn">
            <div class="location-image-large">
                <img id="companyImage" src="https://via.placeholder.com/200x200?text=المركز" alt="موقع المركز">
            </div>
            <div class="location-text-area" id="locationText">
                <!-- اكتب النص الذي تريده هنا -->
                <p class="location-description">Sénégal Centre 10-9-8 </p>
            </div>
        </div>

        <!-- قسم مركز 8 - 14 فندق -->
        <div class="section-divider">
            <div class="divider-line"></div>
            <div class="divider-title">Centre 8</div>
            <div class="divider-line"></div>
        </div>
        <div class="locations-grid" id="center8Grid">
            <!-- سيتم تعبئة 14 فندق -->
        </div>

        <!-- قسم مركز 9 - 12 فندق -->
        <div class="section-divider">
            <div class="divider-line"></div>
            <div class="divider-title">Centre 9</div>
            <div class="divider-line"></div>
        </div>
        <div class="locations-grid" id="center9Grid">
            <!-- سيتم تعبئة 12 فندق -->
        </div>

        <!-- قسم مركز 10 - 8 فندق -->
        <div class="section-divider">
            <div class="divider-line"></div>
            <div class="divider-title">Centre 10</div>
            <div class="divider-line"></div>
        </div>
        <div class="locations-grid" id="center10Grid">
            <!-- سيتم تعبئة 8 فندق -->
        </div>

        <!-- مواقع المخيمات مع صور -->
        <div class="section-title">
            <i class="fas fa-campground"></i>
            <h2>Emplacements des camps</h2>
        </div>
        <div class="camps-container">
            <button class="camp-btn" id="arafatBtn">
                <div class="camp-image">
                    <img id="arafatImage" src="https://via.placeholder.com/80x80?text=عرفات" alt="موقع عرفات">
                </div>
                <div class="camp-content">
                    <i class="fas fa-mountain"></i>
                    <span>Localisation de Arafat</span>
                    <small>Le camp</small>
                </div>
            </button>
            <button class="camp-btn" id="minaBtn">
                <div class="camp-image">
                    <img id="minaImage" src="https://via.placeholder.com/80x80?text=منى" alt="موقع منى">
                </div>
                <div class="camp-content">
                    <i class="fas fa-tent"></i>
                    <span>Localisation de Mina</span>
                    <small>Le camp</small>
                </div>
            </button>
        </div>

        <!-- أزرار التواصل -->
        <div class="section-title">
            <i class="fas fa-headset"></i>
            <h2>Contactez-nous</h2>
        </div>
        
        <div class="contact-buttons">
            <a href="#" id="whatsappBtn" class="contact-btn whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            <a href="#" id="callBtn" class="contact-btn call">
                <i class="fas fa-phone-alt"></i> Call
            </a>
        </div>
        
        <div class="footer">
            <p>Centre 10-9-8 Sénégal - Service 24 heures sur 24</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
